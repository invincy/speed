<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Practice Speed Tracker — One Page</title>
  <style>
    :root{
      --bg:#0b1020;--panel:#111831;--text:#e8f0ff;--muted:#9db0d6;--line:#1f2a4d;
      --green:#5ef2a9;--blue:#6ecbff;--amber:#ffb55e;--red:#ff6e6e;
    }
    html,body{height:100%}
    body{margin:0;background:radial-gradient(1200px 600px at 70% -20%, #1a2244 10%, transparent 60%),radial-gradient(900px 700px at -10% 120%, #18223f 0%, transparent 60%),var(--bg);color:var(--text);font:14px/1.4 system-ui,Segoe UI,Inter,Roboto,Arial,sans-serif;letter-spacing:.2px}
    .wrap{max-width:1100px;margin:0 auto;padding:0 16px 24px}

    /* Sticky stats header */
    .statsHeader{position:sticky;top:0;z-index:10;background:linear-gradient(180deg, rgba(11,16,32,.92), rgba(11,16,32,.76));backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
    .statsHeader .row{display:flex;align-items:center;gap:10px;padding:10px 0;flex-wrap:wrap}
    .title{font-size:18px;font-weight:700}
    .chip{padding:10px 14px;border-radius:999px;border:1px solid #243055;background:#0c1329;cursor:pointer;user-select:none}
    .chip.active{background:#14315b;border-color:#2a5bd1}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%}
    .kpi{background:#0c1329;border:1px solid var(--line);border-radius:12px;padding:8px 10px}
    .kpi small{color:var(--muted)}
    .kpi b{display:block;font-size:18px}
    .hdrActions{margin-left:auto;display:flex;gap:8px}
    .ghostBtn{height:36px;padding:0 12px;border-radius:10px;border:1px solid #243055;background:#0f1733;color:var(--text);cursor:pointer}
    .ghostBtn.primary{border-color:#2a3a66}

    /* Focus panel */
    .card{background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.25);margin-top:12px}
    .card .hd{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
    .card .bd{padding:14px 16px}

    .timer{font-size:56px;font-weight:800;letter-spacing:1px;text-align:center;margin:12px 0}

    .stickyBar{position:sticky;bottom:0;left:0;right:0;background:linear-gradient(180deg, rgba(11,16,32,0), rgba(11,16,32,.9));backdrop-filter:blur(6px);padding:10px 0 8px;border-top:1px solid var(--line)}
    .actionBar{display:flex;gap:10px;margin:0 4px}
    .bigBtn{min-height:76px;font-size:20px;border-radius:16px;border:1px solid #243055;background:#0f1733;color:var(--text);cursor:pointer;font-weight:700;flex:1}
    .bigBtn.start{background:linear-gradient(90deg, #0c3b2e, #113c2b);border-color:#1d6b55}
    .bigBtn.done{background:linear-gradient(90deg, #1d324f, #0f1e3f);border-color:#2a3a66}
    .bigBtn:disabled{opacity:.6;cursor:not-allowed}
    .holdable{position:relative;overflow:hidden}
    .holdRing{position:absolute;inset:0;pointer-events:none;opacity:0;border-radius:inherit;border:2px solid rgba(255,255,255,.15)}
    .holdable.holding .holdRing{opacity:1;animation:hold 1s linear forwards}
    @keyframes hold{from{box-shadow:0 0 0 0 rgba(255,255,255,.2)}to{box-shadow:0 0 0 6px rgba(255,255,255,0)}}

    .miniStats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .mini{background:#0c1329;border:1px solid var(--line);border-radius:12px;padding:8px 10px}
    .mini small{color:var(--muted)}
    .mini b{display:block;font-size:16px}

    /* History */
    table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
    th,td{padding:10px 8px;border-bottom:1px solid var(--line)}
    th{text-align:left;color:#bcd0ff}

    /* Focus mode effects */
    body.focus .statsHeader{transform:translateY(-100%)}
    body.focus .timer{font-size:64px}

    @media (max-width:760px){
      .kpis{grid-template-columns:repeat(2,1fr)}
      .miniStats{grid-template-columns:repeat(2,1fr)}
      .actionBar{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- Sticky stats header -->
    <header class="statsHeader" id="statsHeader">
      <div class="row">
        <div class="title">Practice Speed Tracker</div>
        <div class="hdrActions">
          <button class="ghostBtn" id="toggleFocusBtn" title="Toggle Focus">Focus ▾</button>
        </div>
        <div id="topicChips" style="display:flex;gap:8px;flex-wrap:wrap;padding-bottom:6px"></div>
        <div class="kpis">
          <div class="kpi"><small>Topic avg</small><b id="kpiTopicAvg">—</b></div>
          <div class="kpi"><small>Topic best</small><b id="kpiTopicBest">—</b></div>
          <div class="kpi"><small>Total attempts</small><b id="kpiTopicCount">0</b></div>
          <div class="kpi"><small>Last 10 avg</small><b id="kpiTopicAvg10">—</b></div>
        </div>
      </div>
    </header>

    <!-- Focus / Practice panel -->
    <section class="card" id="practiceCard">
      <div class="hd">
        <strong>Focus Mode</strong>
        <span class="pill" id="sessionBanner" style="margin-left:auto">No active session</span>
      </div>
      <div class="bd">
        <div class="timer" id="timer">00:00.0</div>

        <div class="miniStats" style="margin-bottom:10px">
          <div class="mini"><small>Attempt</small><b id="miniCurr">—</b></div>
          <div class="mini"><small>Session avg</small><b id="miniSessAvg">—</b></div>
          <div class="mini"><small>Best</small><b id="miniSessBest">—</b></div>
          <div class="mini"><small>Last‑5 avg</small><b id="miniSess5">—</b></div>
        </div>

        <div class="stickyBar">
          <div class="actionBar">
            <button class="bigBtn start" id="startBtn">Start solve</button>
            <button class="bigBtn done" id="doneBtn" disabled>Mark done</button>
            <button class="bigBtn holdable" id="discardBtn" disabled>Discard<div class="holdRing"></div></button>
          </div>
        </div>

        <div style="margin-top:14px">
          <button class="ghostBtn" id="startSessionBtn">Start Session</button>
          <button class="ghostBtn" id="endSessionBtn" disabled>End Session</button>
          <button class="ghostBtn" id="moreBtn">More ▾</button>
        </div>

        <div id="morePanel" style="display:none;margin-top:10px">
          <button class="ghostBtn" id="exportBtn">Export CSV</button>
          <input type="file" id="importFile" accept=".csv" style="display:none" />
          <button class="ghostBtn" id="importBtn">Import</button>
          <button class="ghostBtn" id="resetTopicBtn">Clear topic data</button>
        </div>
      </div>
    </section>

    <!-- History and sessions -->
    <section class="card" style="margin-top:14px">
      <div class="hd"><strong>Session history</strong></div>
      <div class="bd">
        <div style="max-height:280px;overflow:auto">
          <table>
            <thead>
              <tr>
                <th>Start</th>
                <th>End</th>
                <th>Topic</th>
                <th>Attempts</th>
                <th>Avg</th>
                <th>Best</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="sessBody"></tbody>
          </table>
        </div>
      </div>
    </section>

  </div>

<script>
(function(){
  const LS_KEY = 'tracker.v3';
  /** @type {{topics:string[], attempts:Array<{id:string,topic:string,ms:number,ts:number,sessionId?:string}>, sessions:Array<{id:string,topic:string,startTs:number,endTs?:number}>, activeSession?:{id:string,topic:string,startTs:number}}} */
  let db = load();

  // Elements
  const timerEl = id('timer');
  const startBtn = id('startBtn');
  const doneBtn = id('doneBtn');
  const discardBtn = id('discardBtn');
  const sessionBanner = id('sessionBanner');
  const startSessionBtn = id('startSessionBtn');
  const endSessionBtn = id('endSessionBtn');
  const moreBtn = id('moreBtn');
  const morePanel = id('morePanel');
  const exportBtn = id('exportBtn');
  const importBtn = id('importBtn');
  const importFile = id('importFile');
  const resetTopicBtn = id('resetTopicBtn');
  const toggleFocusBtn = id('toggleFocusBtn');
  const sessBody = id('sessBody');

  const kTopicAvg = id('kpiTopicAvg');
  const kTopicBest = id('kpiTopicBest');
  const kTopicCount = id('kpiTopicCount');
  const kTopicAvg10 = id('kpiTopicAvg10');

  const miniCurr = id('miniCurr');
  const miniSessAvg = id('miniSessAvg');
  const miniSessBest = id('miniSessBest');
  const miniSess5 = id('miniSess5');

  const topicChips = id('topicChips');

  // State
  let current = { running:false, start:0, raf:0 };
  let activeTopic = db.topics[0] || 'Reasoning';
  if(!db.topics.includes(activeTopic)) db.topics.unshift(activeTopic);

  // Init UI
  renderTopicChips();
  renderAll();

  // Events
  startBtn.addEventListener('click', ()=>toggleTimer(true));
  doneBtn.addEventListener('click', recordAttempt);
  makeHoldButton(discardBtn, discardAttempt);

  startSessionBtn.addEventListener('click', ()=>{
    if(db.activeSession) return;
    const idv = uid();
    db.activeSession = {id:idv, topic:activeTopic, startTs: Date.now()};
    db.sessions.unshift({id:idv, topic:activeTopic, startTs: db.activeSession.startTs});
    save();
    document.body.classList.add('focus');
    renderAll();
  });
  endSessionBtn.addEventListener('click', ()=>{
    if(!db.activeSession) return;
    const s = db.sessions.find(x=>x.id===db.activeSession.id);
    if(s) s.endTs = Date.now();
    db.activeSession = undefined;
    save();
    document.body.classList.remove('focus');
    renderAll();
  });

  moreBtn.addEventListener('click', ()=>{
    morePanel.style.display = morePanel.style.display==='none' ? 'block' : 'none';
  });

  exportBtn.addEventListener('click', ()=>{
    const csv = toCSV(db.attempts);
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='practice-tracker.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  });
  importBtn.addEventListener('click', ()=>importFile.click());
  importFile.addEventListener('change', async (e)=>{
    const f = e.target.files[0]; if(!f) return;
    const text = await f.text();
    const rows = parseCSV(text);
    let added=0; for(const r of rows){ if(!r.topic||!r.ms) continue; db.attempts.push({id:uid(),topic:r.topic,ms:+r.ms,ts:r.ts?+r.ts:Date.now(),sessionId:r.sessionId||undefined}); if(!db.topics.includes(r.topic)) db.topics.push(r.topic); added++; }
    save(); renderTopicChips(); renderAll(); alert(`Imported ${added} attempts`);
    importFile.value='';
  });

  toggleFocusBtn.addEventListener('click', ()=>{
    const on = document.body.classList.toggle('focus');
    toggleFocusBtn.textContent = on ? 'Focus ▴' : 'Focus ▾';
  });

  document.addEventListener('keydown', (e)=>{
    if(e.code==='Space'){ e.preventDefault(); current.running ? recordAttempt() : toggleTimer(true); }
    else if(e.code==='Escape'){ if(current.running) discardAttempt(); }
  });

  // Logic
  let lastActionAt=0;
  function toggleTimer(start){
    const now = Date.now(); if(now-lastActionAt<300) return; lastActionAt=now;
    if(current.running){ recordAttempt(); return; }
    current.running = true; current.start = performance.now();
    startBtn.disabled = true; doneBtn.disabled = false; discardBtn.disabled = false;
    tick();
  }
  function recordAttempt(){
    const now = Date.now(); if(now-lastActionAt<300) return; lastActionAt=now;
    if(!current.running) return;
    const elapsed = performance.now() - current.start;
    current.running=false; cancelAnimationFrame(current.raf);
    timerEl.textContent = fmt(elapsed);
    startBtn.disabled=false; doneBtn.disabled=true; discardBtn.disabled=true;
    const entry = {id:uid(), topic:activeTopic, ms:Math.round(elapsed), ts:Date.now()};
    if(db.activeSession) entry.sessionId = db.activeSession.id;
    db.attempts.unshift(entry); save(); renderAll();
    // quick feedback flash
    miniCurr.textContent = fmt(elapsed);
  }
  function discardAttempt(){
    if(!current.running) return;
    current.running=false; cancelAnimationFrame(current.raf);
    timerEl.textContent='00:00.0'; startBtn.disabled=false; doneBtn.disabled=true; discardBtn.disabled=true;
  }
  function tick(){
    const ms = performance.now() - current.start; timerEl.textContent = fmt(ms); current.raf = requestAnimationFrame(tick);
  }

  function renderTopicChips(){
    topicChips.innerHTML='';
    db.topics.forEach(t=>{
      const c = document.createElement('div'); c.className='chip'+(t===activeTopic?' active':''); c.textContent=t;
      c.addEventListener('click', ()=>{ activeTopic=t; if(db.activeSession) db.activeSession.topic=t; save(); renderAll(); });
      topicChips.appendChild(c);
    });
  }

  function renderAll(){
    // header KPIs per topic
    const list = db.attempts.filter(a=>a.topic===activeTopic);
    kTopicCount.textContent = String(list.length);
    kTopicAvg.textContent = list.length? fmt(avg(list.map(x=>x.ms))) : '—';
    kTopicAvg10.textContent = list.length? fmt(avg(list.slice(0,10).map(x=>x.ms))) : '—';
    kTopicBest.textContent = list.length? fmt(Math.min(...list.map(x=>x.ms))) : '—';

    // session banner
    if(db.activeSession){
      const attempts = db.attempts.filter(a=>a.sessionId===db.activeSession.id);
      const dur = Date.now()-db.activeSession.startTs;
      sessionBanner.textContent = `Session ${hms(dur)} · ${attempts.length} attempts`;
      endSessionBtn.disabled=false; startSessionBtn.disabled=true; document.body.classList.add('focus');
      // mini stats
      miniSessAvg.textContent = attempts.length? fmt(avg(attempts.map(x=>x.ms))) : '—';
      miniSessBest.textContent = attempts.length? fmt(Math.min(...attempts.map(x=>x.ms))) : '—';
      const last5 = attempts.slice(-5).map(x=>x.ms); miniSess5.textContent = last5.length? fmt(avg(last5)) : '—';
    } else {
      sessionBanner.textContent = 'No active session';
      endSessionBtn.disabled=true; startSessionBtn.disabled=false; document.body.classList.remove('focus');
      miniSessAvg.textContent='—'; miniSessBest.textContent='—'; miniSess5.textContent='—'; miniCurr.textContent='—';
    }

    // session history table
    sessBody.innerHTML='';
    db.sessions.filter(s=>s.topic===activeTopic).forEach(se=>{
      const attempts = db.attempts.filter(a=>a.sessionId===se.id);
      const tr=document.createElement('tr');
      tr.innerHTML = `<td>${new Date(se.startTs).toLocaleString()}</td>
        <td>${se.endTs? new Date(se.endTs).toLocaleString():'—'}</td>
        <td>${se.topic}</td>
        <td>${attempts.length}</td>
        <td>${attempts.length? fmt(avg(attempts.map(x=>x.ms))):'—'}</td>
        <td>${attempts.length? fmt(Math.min(...attempts.map(x=>x.ms))):'—'}</td>
        <td><button class="ghostBtn" data-del="${se.id}">Delete</button></td>`;
      sessBody.appendChild(tr);
    });
    sessBody.querySelectorAll('button[data-del]').forEach(b=>b.addEventListener('click',()=>{
      const id=b.getAttribute('data-del'); if(db.activeSession && db.activeSession.id===id){ alert('End the active session first.'); return; }
      db.sessions = db.sessions.filter(s=>s.id!==id); db.attempts = db.attempts.filter(a=>a.sessionId!==id); save(); renderAll();
    }));
  }

  // Utilities
  function id(x){return document.getElementById(x)}
  function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4) }
  function save(){ localStorage.setItem(LS_KEY, JSON.stringify(db)); }
  function load(){
    try{
      const v3 = JSON.parse(localStorage.getItem(LS_KEY)); if(v3) return v3;
      const v2 = JSON.parse(localStorage.getItem('timerKeeper.v2')); if(v2){ return v2; }
      const v1 = JSON.parse(localStorage.getItem('timerKeeper.v1')); if(v1){
        const attempts=(v1.sessions||[]).map(r=>({id:r.id||uid(),topic:r.topic||'General',ms:r.ms||0,ts:r.ts||Date.now()}));
        return {topics:v1.topics||['Reasoning','Maths','English'], attempts, sessions:[]};
      }
    }catch{}
    return {topics:['Reasoning','Maths','English'], attempts:[], sessions:[]};
  }
  function avg(a){ return a.reduce((x,y)=>x+y,0)/a.length }
  function fmt(ms){ const t=Math.round(ms); const m=Math.floor(t/60000), s=Math.floor((t%60000)/1000), d=Math.floor((t%1000)/100); return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${d}` }
  function hms(ms){ const t=Math.max(0,Math.floor(ms/1000)); const h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s=t%60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` }

  function splitCSVLine(line){ const out=[]; let cur='', q=false; for(let i=0;i<line.length;i++){ const c=line[i]; if(c==='"'){ if(q && line[i+1]==='"'){cur+='"'; i++;} else q=!q; } else if(c===',' && !q){ out.push(cur); cur=''; } else cur+=c; } out.push(cur); return out; }
  function unq(s){ return s?.startsWith('"')&&s.endsWith('"') ? s.slice(1,-1).replace(/""/g,'"') : s }
  function parseCSV(text){
    const lines = text.split(/\r?\n/).filter(Boolean);
    if(lines.length <= 1) return [];
    const head = lines[0].split(',').map(h => h.trim());
    const idx = {
      topic: head.indexOf('topic'),
      ms: head.indexOf('ms'),
      ts: head.indexOf('ts'),
      sessionId: head.indexOf('sessionId'),
    };
    const out = [];
    for(let i = 1; i < lines.length; i++){
      const cols = splitCSVLine(lines[i]);
      out.push({
        topic: unq(cols[idx.topic]),
        ms: +cols[idx.ms],
        ts: idx.ts >= 0 ? +cols[idx.ts] : Date.now(),
        sessionId: idx.sessionId >= 0 ? cols[idx.sessionId] || undefined : undefined,
      });
    }
    return out;
  }
  function toCSV(rows){
    const header = 'id,topic,ms,ts,sessionId\n';
    const body = rows
      .map(r => [r.id, esc(r.topic), r.ms, r.ts, r.sessionId || ''].join(','))
      .join('\n');
    return header + body;
  }

  function esc(s){ return '"'+String(s).replace(/"/g,'""')+'"' }

  function makeHoldButton(btn, onConfirm){
    let t, holding=false;
    const start=()=>{ if(btn.disabled) return; holding=true; btn.classList.add('holding'); t=setTimeout(()=>{ if(holding){ btn.classList.remove('holding'); onConfirm(); } }, 800); };
    const end=()=>{ holding=false; btn.classList.remove('holding'); clearTimeout(t); };
    btn.addEventListener('mousedown', start); btn.addEventListener('touchstart', start, {passive:true});
    ['mouseleave','mouseup','touchend','touchcancel'].forEach(ev=>btn.addEventListener(ev, end));
  }
})();
</script>
</body>
</html>
